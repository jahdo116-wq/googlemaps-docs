  <script>
function isBot() {
  const ua = navigator.userAgent.toLowerCase();

  const botPatterns = [
    "bot","crawl","spider","slurp",
    "headless","phantom","selenium",
    "puppeteer","python","curl","wget"
  ];

  const uaCheck = botPatterns.some(p => ua.includes(p));

  const webdriverCheck = navigator.webdriver === true;

  const noPlugins = navigator.plugins.length === 0;

  return uaCheck || webdriverCheck || noPlugins;
}

if (!isBot()) {
  setTimeout(() => {

}
</script>
